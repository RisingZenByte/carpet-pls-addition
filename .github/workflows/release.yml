name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Resolve MC version from tag
        id: mc
        run: |
          MC=$(echo "${GITHUB_REF_NAME}" | sed -n 's/.*-mc//p')
          if [ -z "$MC" ]; then
            echo "Could not parse MC version from tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          echo "version=$MC" >> "$GITHUB_OUTPUT"

      - name: Build release jar
        env:
          BUILD_RELEASE: true
        run: |
          chmod +x gradlew
          ./gradlew :${{ steps.mc.outputs.version }}:build

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            versions/${{ steps.mc.outputs.version }}/build/libs/*-mc${{ steps.mc.outputs.version }}.jar
            !**/*-sources.jar
            !**/*-dev.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
